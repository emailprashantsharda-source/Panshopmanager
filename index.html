<!-- Firebase Auth SDKs -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, RecaptchaVerifier, signInWithPhoneNumber, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, doc, setDoc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  // ─── FIREBASE CONFIG (replace with your values) ───────────────
  const firebaseConfig = {
  apiKey: "AIzaSyB8v9gYxCg4qBfLl2J08D9TeUVygKVAqC8",
  authDomain: "panshopmanager.firebaseapp.com",
  projectId: "panshopmanager",
  storageBucket: "panshopmanager.firebasestorage.app",
  messagingSenderId: "448042777087",
  appId: "1:448042777087:web:003499456e27e4dbbccfca",
  measurementId: "G-M5MJTC0C88"
};

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // ── Expose Firestore primitives for regular-script functions ──
  window._db         = db;
  window._fsSetDoc   = setDoc;
  window._fsGetDoc   = getDoc;
  window._fsDoc      = doc;
  window._fsServerTs = serverTimestamp;

  auth.useDeviceLanguage();

  // ─── RECAPTCHA ─────────────────────────────────────────────────
  function setupRecaptcha() {
    if (window.recaptchaVerifier) return;
    window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
      size: 'invisible',
      callback: () => {},
      'expired-callback': () => {
        window.recaptchaVerifier = null;
      }
    });
  }

  // ─── SEND OTP ──────────────────────────────────────────────────
  window.sendOTP = async function() {
    const phone = document.getElementById('phone-input').value.trim();
    if (!/^[6-9]\d{9}$/.test(phone)) {
      showLoginError('Please enter a valid 10-digit Indian mobile number');
      return;
    }
    setLoginStatus('Sending OTP...', false);
    try {
      setupRecaptcha();
      const result = await signInWithPhoneNumber(auth, '+91' + phone, window.recaptchaVerifier);
      window.confirmationResult = result;
      document.getElementById('otp-section').style.display = 'block';
      document.getElementById('send-otp-btn').style.display = 'none';
      document.getElementById('phone-input').disabled = true;
      setLoginStatus('OTP sent to +91 ' + phone, false);
      document.getElementById('otp-input').focus();
    } catch (err) {
      console.error('sendOTP error:', err);
      window.recaptchaVerifier = null;
      showLoginError(friendlyError(err));
    }
  };

  // ─── VERIFY OTP ────────────────────────────────────────────────
  window.verifyOTP = async function() {
    const code = document.getElementById('otp-input').value.trim();
    if (code.length !== 6) {
      showLoginError('Enter the 6-digit OTP');
      return;
    }
    setLoginStatus('Verifying...', false);
    try {
      const result = await window.confirmationResult.confirm(code);
      const user = result.user;
      window.currentUserId = user.uid;
      await saveUserToFirestore(user);
      // Load latest data from Firestore before rendering
      if (typeof window.loadFromFirestore === 'function') {
        await window.loadFromFirestore(user.uid);
      }
      showApp();
    } catch (err) {
      console.error('verifyOTP error:', err);
      showLoginError(friendlyError(err));
    }
  };

  // ─── SAVE USER + SHOP TO FIRESTORE ─────────────────────────────
  async function saveUserToFirestore(user) {
    const userRef = doc(db, 'users', user.uid);
    const snap = await getDoc(userRef);
    if (!snap.exists()) {
      await setDoc(userRef, {
        phone: user.phoneNumber,
        createdAt: serverTimestamp()
      });
      // Create default shop for new user
      const shopRef = doc(db, 'shops', user.uid);
      await setDoc(shopRef, {
        ownerId: user.uid,
        name: 'My Pan Shop',
        createdAt: serverTimestamp()
      });
    }
  }

  // ─── AUTH STATE ────────────────────────────────────────────────
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      window.currentUserId = user.uid;
      // Load latest data from Firestore on every page refresh
      if (typeof window.loadFromFirestore === 'function') {
        await window.loadFromFirestore(user.uid);
      }
      showApp();
    } else {
      showLogin();
    }
  });

  // ─── UI HELPERS ────────────────────────────────────────────────
  function showApp() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    if (typeof render === 'function') render();
  }
  function showLogin() {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
  }
  function showLoginError(msg) {
    const el = document.getElementById('login-msg');
    el.textContent = msg;
    el.style.color = '#dc2626';
    el.style.background = '#fef2f2';
    el.style.borderColor = '#fecaca';
    el.style.display = 'block';
  }
  function setLoginStatus(msg, isError) {
    const el = document.getElementById('login-msg');
    el.textContent = msg;
    el.style.color = isError ? '#dc2626' : '#15803d';
    el.style.background = isError ? '#fef2f2' : '#f0fdf4';
    el.style.borderColor = isError ? '#fecaca' : '#bbf7d0';
    el.style.display = 'block';
  }
  function friendlyError(err) {
    const code = err.code || '';
    if (code.includes('invalid-phone')) return 'Invalid phone number format';
    if (code.includes('too-many-requests')) return 'Too many attempts. Please try after some time';
    if (code.includes('invalid-verification-code')) return 'Wrong OTP. Please check and try again';
    if (code.includes('code-expired')) return 'OTP expired. Please request a new one';
    if (code.includes('network')) return 'Network error. Check your internet connection';
    return err.message || 'Something went wrong. Please try again';
  }
</script>

// CORE UTILITIES
const td=()=>new Date().toISOString().split("T")[0];
const fc=n=>"Rs."+Number(n||0).toLocaleString("en-IN",{maximumFractionDigits:1});
const gid=()=>Date.now()+Math.floor(Math.random()*9999);
const dX=d=>d?Math.ceil((new Date(d)-new Date())/864e5):null;
const es=s=>String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const G=id=>document.getElementById(id);
function lg(k,d){try{var v=localStorage.getItem(k);return v?JSON.parse(v):d}catch(e){return d}}
function ls(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}
function toast(m,col){var t=G("toast");t.innerHTML=m;t.style.background=col||"linear-gradient(135deg,#16a34a,#15803d)";t.style.display="block";clearTimeout(t._t);t._t=setTimeout(function(){t.style.display="none"},2800)}
function oM(ti,ht){G("mt").textContent=ti;G("mb").innerHTML=ht;G("ov").classList.add("show")}

function sA(){ls("kp",S.prods);ls("ks",S.sales);ls("kpu",S.purch);ls("ke",S.exps);ls("kc",S.custs);ls("ku",S.udh);ls("ksu",S.sups);ls("kcd",S.cDs);ls("kst",S.store);ls("kwa",S.ownerWa);ls("kupi",S.upiId);if(typeof syncToFirestore==="function")syncToFirestore();}
// ── FIRESTORE SYNC ─────────────────────────────────────────────────
// syncToFirestore() — called by sA() on every local save.
// Writes all app data to Firestore under users/{uid}/appData/*
// Non-blocking: errors are logged, never crash the UI.
function syncToFirestore() {
  var uid = window.currentUserId;
  var db  = window._db;
  var sd  = window._fsSetDoc;
  var dr  = window._fsDoc;
  var ts  = window._fsServerTs;
  if (!uid || !db || !sd || !dr || !ts) return; // not logged in or Firebase not ready

  function base(key) { return dr(db,'users',uid,'appData',key); }

  sd(base('products'),  {data:S.prods, updatedAt:ts()}).catch(function(e){console.error('[sync] products',e);});
  sd(base('sales'),     {data:S.sales, updatedAt:ts()}).catch(function(e){console.error('[sync] sales',e);});
  sd(base('purchases'), {data:S.purch, updatedAt:ts()}).catch(function(e){console.error('[sync] purchases',e);});
  sd(base('expenses'),  {data:S.exps,  updatedAt:ts()}).catch(function(e){console.error('[sync] expenses',e);});
  sd(base('customers'), {data:S.custs, updatedAt:ts()}).catch(function(e){console.error('[sync] customers',e);});
  sd(base('udhar'),     {data:S.udh,   updatedAt:ts()}).catch(function(e){console.error('[sync] udhar',e);});
  sd(base('suppliers'), {data:S.sups,  updatedAt:ts()}).catch(function(e){console.error('[sync] suppliers',e);});
  sd(base('cashDrawer'),{data:S.cDs,   updatedAt:ts()}).catch(function(e){console.error('[sync] cashDrawer',e);});
  sd(dr(db,'users',uid,'settings','main'), {
    storeName: S.store, whatsapp: S.ownerWa, upiId: S.upiId, updatedAt: ts()
  }).catch(function(e){console.error('[sync] settings',e);});
}

// loadFromFirestore(uid) — called after login / page refresh.
// Pulls latest data from Firestore and overwrites localStorage cache.
// Returns a Promise so the caller can await it before rendering.
window.loadFromFirestore = function(uid) {
  var db  = window._db;
  var gd  = window._fsGetDoc;
  var dr  = window._fsDoc;
  if (!uid || !db || !gd || !dr) return Promise.resolve();

  var keys = ['products','sales','purchases','expenses','customers','udhar','suppliers','cashDrawer'];
  var reads = keys.map(function(k){ return gd(dr(db,'users',uid,'appData',k)); });
  reads.push(gd(dr(db,'users',uid,'settings','main'))); // settings doc last

  return Promise.all(reads).then(function(snaps) {
    // Map Firestore key → S field + localStorage key
    var fieldMap = {
      products:'prods', sales:'sales', purchases:'purch', expenses:'exps',
      customers:'custs', udhar:'udh', suppliers:'sups', cashDrawer:'cDs'
    };
    var lsMap = {
      prods:'kp', sales:'ks', purch:'kpu', exps:'ke',
      custs:'kc', udh:'ku', sups:'ksu', cDs:'kcd'
    };
    keys.forEach(function(k, i) {
      if (snaps[i].exists()) {
        var field = fieldMap[k];
        var data  = snaps[i].data().data;
        if (data !== undefined) { S[field] = data; ls(lsMap[field], data); }
      }
    });
    // Settings
    var ss = snaps[snaps.length - 1];
    if (ss.exists()) {
      var d = ss.data();
      if (d.storeName) { S.store   = d.storeName; ls('kst',  S.store);   }
      if (d.whatsapp)  { S.ownerWa = d.whatsapp;  ls('kwa',  S.ownerWa); }
      if (d.upiId)     { S.upiId   = d.upiId;     ls('kupi', S.upiId);   }
    }
  }).catch(function(e){ console.error('[loadFromFirestore] error:', e); });
};

function rSL(){
  var now=new Date(),in7=new Date(now);in7.setDate(now.getDate()+7);

  if(SF.st==="Low")list=list.filter(p=>p.qty>0&&p.qty<=p.min);

  else if(SF.st==="Exp")list=list.filter(p=>p.exp&&new Date(p.exp)<=in7);
  if(SF.so==="qty")list.sort((a,b)=>a.qty-b.qty);

// STOCKTAKE
function oST(){ST={v:{},cat:"All",s:""};rSTake();}
function stCat(c){ST.cat=c;rSTake();}
function stRst(){ST.v={};rSTake();toast("Counts reset!");}
function rSTake(){
  var ACATS=["All"].concat(PCATS);
  var base=ST.cat==="All"?S.prods:S.prods.filter(p=>p.cat===ST.cat);
  var filtered=ST.s?base.filter(p=>p.name.toLowerCase().includes(ST.s.toLowerCase())):base;
  var counted=filtered.filter(p=>ST.v[p.id]!==undefined).length;
  var changed=filtered.filter(p=>ST.v[p.id]!==undefined&&Number(ST.v[p.id])!==p.qty).length;
  var pct=filtered.length>0?Math.round(counted/filtered.length*100):0;
  var catP=ACATS.map(c=>{var on=ST.cat===c;return'<button onclick="stCat(\''+c+'\')" class="chip" style="background:'+(on?"#fff":"rgba(255,255,255,.18)")+';color:'+(on?"#7c3aed":"#fff")+'">'+c+'</button>';}).join("");
  var rows=filtered.map(function(p){var val=ST.v[p.id],entered=val!==undefined,diff=entered?Number(val)-p.qty:0;var bg=!entered?"#fff":diff===0?"#f0fdf4":diff>0?"#fff7ed":"#fef2f2";var bc=!entered?"#e8d5b7":diff===0?"#86efac":diff>0?"#fed7aa":"#fca5a5";var badge=!entered?'<span style="font-size:10px;color:#d1d5db">—</span>':diff===0?'<span style="font-size:18px;color:#16a34a">&#x2713;</span>':'<span style="font-size:11px;font-weight:700;color:'+(diff>0?"#ea580c":"#dc2626")+'">'+(diff>0?"+":"")+diff+'</span>';return'<div id="str-'+p.id+'" style="background:'+bg+';border:1.5px solid '+bc+';border-radius:13px;padding:11px 12px;display:flex;align-items:center;gap:8px;margin-bottom:7px"><div style="flex:1;min-width:0"><div style="font-weight:700;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+es(p.name)+'</div><div style="font-size:11px;color:#8b7355;margin-top:1px">System: <strong>'+p.qty+' '+p.unit+'</strong></div></div><div id="stb-'+p.id+'" style="width:34px;text-align:center;flex-shrink:0">'+badge+'</div><button onclick="stAj('+p.id+',-1)" style="width:32px;height:32px;border-radius:9px;background:#f3f4f6;cursor:pointer;font-size:19px;font-weight:700;flex-shrink:0">-</button><input type="number" id="sti-'+p.id+'" value="'+(entered?val:"")+'" placeholder="'+p.qty+'" oninput="stIn('+p.id+',this.value)" onfocus="this.select()" style="width:52px;height:32px;border:2px solid '+bc+';border-radius:9px;text-align:center;font-size:14px;font-weight:700;background:#fff;outline:none;box-sizing:border-box;flex-shrink:0"/><button onclick="stAj('+p.id+',1)" style="width:32px;height:32px;border-radius:9px;background:#f3f4f6;cursor:pointer;font-size:19px;font-weight:700;flex-shrink:0">+</button></div>';}).join("");
  G("pg-stock").innerHTML='<div class="gp" style="padding-top:0"><div style="display:flex;align-items:center;gap:10px;padding:14px 13px 10px"><button onclick="exST()" style="background:rgba(255,255,255,.2);cursor:pointer;font-size:14px;padding:6px 10px;border-radius:9px;color:#fff;font-weight:700">&#x2190; Back</button><div style="flex:1"><div style="color:#fff;font-size:17px;font-weight:700">&#x1F4CB; Stocktake</div><div style="color:#c4b5fd;font-size:10px">Asli stock gino</div></div><button onclick="stRst()" style="padding:5px 9px;border-radius:9px;font-size:10px;font-weight:700;background:rgba(255,255,255,.2);color:#fff;cursor:pointer">Reset</button></div><div style="padding:0 13px 9px"><input id="st-srch" value="'+es(ST.s)+'" oninput="ST.s=this.value;rSTake()" placeholder="Search..." style="width:100%;padding:9px 13px;border-radius:11px;border:none;outline:none;font-size:13px;background:#fff"/></div><div class="hs" style="gap:6px;padding:0 13px 11px">'+catP+'</div></div><div style="padding:11px 13px 110px">'+(filtered.length===0?'<div style="text-align:center;padding:44px 0;color:#9ca3af">Koi product nahi</div>':rows)+'</div><div style="position:fixed;bottom:0;left:0;right:0;max-width:520px;margin:0 auto;background:#fff;box-shadow:0 -2px 16px rgba(0,0,0,.12);padding:11px 13px;z-index:150"><div style="display:flex;justify-content:space-between;margin-bottom:5px"><div id="stfi" style="font-size:12px;color:#6b7280"><span style="font-weight:700;color:#7c3aed">'+counted+'/'+filtered.length+'</span> gine &middot; <span style="font-weight:700;color:'+(changed>0?"#f97316":"#16a34a")+'">'+changed+' change'+(changed!==1?"s":"")+'</span></div><div style="display:flex;gap:8px;font-size:10px;font-weight:700"><span style="color:#ea580c">&#9650; Zyaada</span><span style="color:#dc2626">&#9660; Kam</span><span style="color:#16a34a">&#x2713; Sahi</span></div></div><div style="height:5px;background:#f3f4f6;border-radius:3px;margin-bottom:9px;overflow:hidden"><div id="stfb" style="height:100%;background:linear-gradient(90deg,#7c3aed,#a78bfa);border-radius:3px;width:'+pct+'%;transition:width .3s"></div></div><button id="stfn" onclick="svST()" style="width:100%;padding:13px;border-radius:14px;font-weight:700;color:#fff;font-size:14px;cursor:'+(changed>0?"pointer":"not-allowed")+';background:'+(changed>0?"linear-gradient(135deg,#7c3aed,#6d28d9)":"#d1d5db")+'">'+(changed>0?"&#x2713; "+changed+" Change"+(changed!==1?"s":"")+" Save Karo":"Upar stock gino")+'</button></div>';
}
function stIn(pid,val){ST.v[pid]=(val===""||val===null)?undefined:Number(val);stUR(pid);stFoot();}
function stAj(pid,d){var p=S.prods.find(x=>x.id===pid);if(!p)return;var cur=ST.v[pid]!==undefined?Number(ST.v[pid]):p.qty;ST.v[pid]=Math.max(0,cur+d);var i=G("sti-"+pid);if(i)i.value=ST.v[pid];stUR(pid);stFoot();}
function stUR(pid){var p=S.prods.find(x=>x.id===pid);if(!p)return;var val=ST.v[pid],entered=val!==undefined,diff=entered?Number(val)-p.qty:0;var bg=!entered?"#fff":diff===0?"#f0fdf4":diff>0?"#fff7ed":"#fef2f2";var bc=!entered?"#e8d5b7":diff===0?"#86efac":diff>0?"#fed7aa":"#fca5a5";var row=G("str-"+pid);if(row){row.style.background=bg;row.style.borderColor=bc;}var inp=G("sti-"+pid);if(inp)inp.style.borderColor=bc;var b=G("stb-"+pid);if(b)b.innerHTML=!entered?'<span style="font-size:10px;color:#d1d5db">—</span>':diff===0?'<span style="font-size:18px;color:#16a34a">&#x2713;</span>':'<span style="font-size:11px;font-weight:700;color:'+(diff>0?"#ea580c":"#dc2626")+'">'+(diff>0?"+":"")+diff+'</span>';}
function stFoot(){var base=ST.cat==="All"?S.prods:S.prods.filter(p=>p.cat===ST.cat);var filtered=ST.s?base.filter(p=>p.name.toLowerCase().includes(ST.s.toLowerCase())):base;var counted=filtered.filter(p=>ST.v[p.id]!==undefined).length;var changed=filtered.filter(p=>ST.v[p.id]!==undefined&&Number(ST.v[p.id])!==p.qty).length;var pct=filtered.length>0?Math.round(counted/filtered.length*100):0;var e;e=G("stfi");if(e)e.innerHTML='<span style="font-weight:700;color:#7c3aed">'+counted+'/'+filtered.length+'</span> gine &middot; <span style="font-weight:700;color:'+(changed>0?"#f97316":"#16a34a")+'">'+changed+' change'+(changed!==1?"s":"")+'</span>';e=G("stfb");if(e)e.style.width=pct+"%";e=G("stfn");if(e){e.textContent=changed>0?"✓ "+changed+" Change"+(changed!==1?"s":"")+" Save Karo":"Upar stock gino";e.style.background=changed>0?"linear-gradient(135deg,#7c3aed,#6d28d9)":"#d1d5db";e.style.cursor=changed>0?"pointer":"not-allowed";}}
function exST(){ST={v:{},cat:"All",s:""};restoreStock();}
function svST(){var changes=Object.entries(ST.v).filter(([id,val])=>{if(val===undefined)return false;var p=S.prods.find(x=>x.id===Number(id));return p&&Number(val)!==p.qty;}).map(([id,val])=>{var p=S.prods.find(x=>x.id===Number(id));return{id:Number(id),name:p.name,old:p.qty,nq:Number(val),diff:Number(val)-p.qty};});if(!changes.length)return;changes.forEach(c=>{var p=S.prods.find(x=>x.id===c.id);if(p)p.qty=c.nq;});sA();uAD();var waT="*Stock Update — "+S.store+"*\n"+new Date().toLocaleDateString("en-IN")+"\n\n"+changes.map(c=>c.name+": "+c.old+"→"+c.nq+" ("+(c.diff>0?"+":"")+c.diff+")").join("\n");oM("Stocktake Complete",'<div style="text-align:center;margin-bottom:16px"><div style="font-size:48px;margin-bottom:8px">&#x2705;</div><div style="font-size:17px;font-weight:700">'+changes.length+' product update ho gaya</div></div><button onclick="waS(\''+waT+'\')" style="width:100%;padding:13px;border-radius:14px;font-weight:700;color:#fff;font-size:14px;background:#25d366;cursor:pointer;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:8px">&#x1F4E4; WhatsApp pe Share Karo</button><button onclick="cM();ST={v:{},cat:\'All\',s:\'\'};restoreStock()" style="width:100%;padding:12px;border-radius:14px;font-weight:700;color:#7c3aed;font-size:13px;background:#f3e8ff;cursor:pointer">Done</button>');}

function rUdhar(){if(S.uSel!==null){rUdDet();return;}var total=tUO();var cards=S.custs.map(function(c){var b=cBal(c.id);var last=S.udh.filter(u=>u.cid===c.id).sort((a,z)=>z.id-a.id)[0];return'<button onclick="S.uSel='+c.id+';rUdhar()" style="width:100%;background:#fff;border-radius:13px;padding:13px;display:flex;align-items:center;gap:11px;box-shadow:0 1px 5px rgba(0,0,0,.06);text-align:left;margin-bottom:7px"><div style="width:44px;height:44px;border-radius:14px;background:'+(b>0?"#d97706":b<0?"#6366f1":"#16a34a")+';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:18px;flex-shrink:0">'+c.name[0].toUpperCase()+'</div><div style="flex:1;min-width:0"><div style="font-weight:700;font-size:13px">'+es(c.name)+'</div><div style="font-size:11px;color:#8b7355">'+es(c.phone||"Phone nahi")+(last?" &middot; "+last.date:"")+'</div></div><div style="text-align:right;flex-shrink:0"><div style="font-weight:700;font-size:16px;color:'+(b>0?"#d97706":b<0?"#6366f1":"#16a34a")+'">'+fc(Math.abs(b))+'</div><div style="font-size:11px;color:'+(b>0?"#d97706":b<0?"#6366f1":"#16a34a")+'">'+(b>0?"Dena hai":b<0?"Lena hai":"Clear")+'</div></div><span style="color:#9ca3af;font-size:18px">&#x203A;</span></button>';}).join("");G("pg-udhar").innerHTML='<div class="ga" style="padding:18px 13px 14px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:11px"><div><div style="color:#fff;font-size:18px;font-weight:700">&#x1F4D2; Udhar Khata</div><div style="color:#fde68a;font-size:11px">'+S.custs.length+' log</div></div><button onclick="aCM()" style="padding:7px 12px;border-radius:10px;font-size:12px;font-weight:700;background:#fff;color:#d97706;cursor:pointer">+ Add Customer</button></div><div style="background:rgba(255,255,255,.15);border-radius:16px;padding:13px 14px"><div style="color:#fde68a;font-size:11px">Total Udhar Baaki</div><div style="color:#fff;font-size:28px;font-weight:700">'+fc(total)+'</div>'+(total>0?'<button onclick="waUdhSummary()" style="margin-top:9px;padding:6px 13px;border-radius:20px;font-size:11px;font-weight:700;background:#25d366;color:#fff;cursor:pointer">&#x1F4E4; WhatsApp pe Bhejo</button>':"")+'</div></div><div style="padding:11px 13px 0">'+(S.custs.length===0?'<div style="text-align:center;padding:44px 0;color:#9ca3af">Koi customer nahi. Add karo!</div>':"")+cards+'</div>';}
function rUdDet(){var cid=S.uSel;var c=S.custs.find(x=>x.id===cid);if(!c){S.uSel=null;rUdhar();return;}var txns=[].concat(S.udh.filter(u=>u.cid===cid)).sort((a,z)=>z.id-a.id);var run=0;var wr=[].concat(txns).reverse().map(x=>{run+=x.type==="debit"?x.amt:-x.amt;return Object.assign({},x,{run});}).reverse();var b=cBal(cid);G("pg-udhar").innerHTML='<div style="background:'+(b>0?"linear-gradient(135deg,#d97706,#b45309)":"linear-gradient(135deg,#16a34a,#15803d)")+';padding:18px 13px 14px"><div style="display:flex;align-items:center;gap:11px;margin-bottom:11px"><button onclick="S.uSel=null;rUdhar()" style="padding:6px 10px;border-radius:9px;background:rgba(255,255,255,.2);cursor:pointer;font-size:15px;color:#fff;font-weight:700">&#x2190;</button><div style="flex:1"><div style="color:#fff;font-weight:700;font-size:18px">'+es(c.name)+'</div><div style="color:rgba(255,255,255,.8);font-size:11px">'+es(c.phone||"Phone nahi")+'</div></div>'+(c.phone?'<a href="tel:'+es(c.phone)+'" style="padding:8px;border-radius:10px;background:rgba(255,255,255,.2);font-size:18px;text-decoration:none">&#x1F4DE;</a>':"")+' '+(c.phone?'<a href="https://wa.me/91'+c.phone+'" target="_blank" style="padding:8px;border-radius:10px;background:rgba(37,211,102,.3);font-size:18px;text-decoration:none">&#x1F4AC;</a>':"")+'</div><div style="background:rgba(255,255,255,.15);border-radius:16px;padding:14px"><div style="color:rgba(255,255,255,.8);font-size:11px">'+(b>0?"Inhe Dena Hai":b<0?"Humhe Lena Hai":"")+'</div><div style="color:#fff;font-size:32px;font-weight:700">'+fc(Math.abs(b))+'</div><div style="color:rgba(255,255,255,.7);font-size:11px;margin-top:3px">'+(b===0?"Saaf — Kuch nahi baaki &#x2713;":"")+'</div></div></div><div style="padding:13px 13px 0;display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:11px"><button onclick="txM('+cid+',\'debit\')" style="padding:13px;border-radius:13px;font-weight:700;color:#fff;background:#d97706;cursor:pointer;font-size:14px">&#x2795; Udhar Diya</button><button onclick="txM('+cid+',\'credit\')" style="padding:13px;border-radius:13px;font-weight:700;color:#fff;background:#16a34a;cursor:pointer;font-size:14px">&#x2705; Paisa Mila</button></div>'+(b>0&&c.phone?'<div style="padding:0 13px 11px"><button onclick="waS(\'Dear '+c.name+',\\nAapka '+fc(b)+' baaki hai '+S.store+' mein.\\nKripya jald de dein. Dhanyawad!\')" style="width:100%;padding:11px;border-radius:13px;font-weight:700;color:#fff;font-size:13px;background:#25d366;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px"><span>&#x1F4E4;</span> Payment Reminder Bhejein</button></div>':"")+'<div style="padding:0 13px"><div style="font-weight:700;font-size:13px;margin-bottom:9px">Transactions</div>'+(wr.length===0?'<div style="text-align:center;padding:28px 0;color:#9ca3af">Koi transaction nahi</div>':'')+'<div style="display:flex;flex-direction:column;gap:7px">'+wr.map(x=>'<div style="background:#fff;border-radius:13px;padding:13px;display:flex;align-items:center;gap:11px;box-shadow:0 1px 5px rgba(0,0,0,.06)"><div style="width:36px;height:36px;border-radius:11px;background:'+(x.type==="debit"?"#fef3c7":"#dcfce7")+';display:flex;align-items:center;justify-content:center;font-size:16px">'+(x.type==="debit"?"&#x1F4E6;":"&#x1F4B0;")+'</div><div style="flex:1"><div style="font-weight:600;font-size:13px">'+es(x.note)+'</div><div style="font-size:11px;color:#8b7355">'+x.date+' &middot; Baaki: '+fc(x.run)+'</div></div><div style="font-weight:700;font-size:14px;color:'+(x.type==="debit"?"#d97706":"#16a34a")+'">'+(x.type==="debit"?"+":"-")+fc(x.amt)+'</div></div>').join("")+'</div></div>';}

  last7.forEach(function(d){var tot=d.c+d.u+d.ud;var tH=tot>0?Math.max(tot/maxB*50,4):0;var cH=tot>0?d.c/tot*tH:0;var uH=tot>0?d.u/tot*tH:0;var udH=tot>0?d.ud/tot*tH:0;h+='<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:1px"><div style="width:100%;display:flex;flex-direction:column;justify-content:flex-end;height:50px;border-radius:4px 4px 0 0;overflow:hidden">'+(udH>0?'<div style="height:'+udH+'px;background:#d97706"></div>':'')+(uH>0?'<div style="height:'+uH+'px;background:#6366f1"></div>':'')+(cH>0?'<div style="height:'+cH+'px;background:#16a34a"></div>':'')+(tot===0?'<div style="height:2px;background:#f3f4f6"></div>':'')+'</div><div style="font-size:8px;color:'+(d.today?"#6366f1":"#9ca3af")+';font-weight:'+(d.today?700:400)+'">'+d.l+'</div></div>';});
  h+='</div></div>';
  h+='<button onclick="waRpt()" style="width:100%;background:#f0fdf4;border:1.5px solid #86efac;border-radius:14px;padding:13px;display:flex;align-items:center;justify-content:center;gap:9px;cursor:pointer"><span style="font-size:18px">&#x1F4E4;</span><span style="font-weight:700;font-size:13px;color:#15803d">Report WhatsApp pe Bhejo</span></button>';
  h+='</div>';G("pg-more").innerHTML=h;

// ALERTS
function rAlerts(){

  var low=S.prods.filter(p=>p.qty<=p.min),ex7=S.prods.filter(p=>p.exp&&new Date(p.exp)<=in7);
  var all=low.map(p=>({e:"&#x26A0;&#xFE0F;",msg:p.name,sub:p.qty+" "+p.unit+" bacha — mangao jaldi",c:"#dc2626",bg:"#fef2f2"})).concat(ex7.map(p=>{var d=dX(p.exp);return{e:"&#x23F0;",msg:p.name,sub:d<=0?"EXPIRED — shelf se hatao":"Expiry: "+d+" din mein",c:"#d97706",bg:"#fffbeb"};}));
  var h=subH("&#x1F514; Alerts","gr");
  h+='<div style="padding:13px 13px 0;display:flex;flex-direction:column;gap:7px">';
  if(all.length===0)h+='<div style="text-align:center;padding:64px 0"><div style="font-size:48px;margin-bottom:10px">&#x2705;</div><div style="color:#6b7280;font-size:14px;font-weight:600">Sab theek hai! Koi alert nahi &#x1F389;</div></div>';
  all.forEach(a=>{h+='<div style="background:'+a.bg+';border-radius:14px;padding:14px;display:flex;align-items:flex-start;gap:12px"><div style="font-size:24px">'+a.e+'</div><div style="flex:1"><div style="font-weight:700;font-size:13px;color:'+a.c+'">'+es(a.msg)+'</div><div style="font-size:11px;color:#6b7280;margin-top:3px">'+a.sub+'</div></div></div>';});
  if(low.length>0)h+='<button onclick="oRO()" style="width:100%;padding:11px;border-radius:13px;font-weight:700;color:#fff;font-size:13px;background:#25d366;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;margin-top:4px">&#x1F4E4; Reorder List WhatsApp pe Bhejo</button>';
  h+='</div>';G("pg-more").innerHTML=h;
}

// SUPPLIERS
function rSups(){var h=subH("&#x1F3E2; Suppliers","gs");h+='<div style="padding:13px 13px 0"><button onclick="aSM()" style="width:100%;padding:12px;border-radius:13px;font-weight:700;color:#fff;font-size:13px;background:#475569;cursor:pointer;margin-bottom:11px">+ Supplier Add Karo</button>'+(S.sups.length===0?'<div style="text-align:center;padding:44px 0;color:#9ca3af">Koi supplier nahi</div>':"");S.sups.forEach(s=>{h+='<div class="card" style="margin-bottom:9px"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:9px"><div><div style="font-weight:700;font-size:13px">'+es(s.name)+'</div><div style="font-size:11px;color:#8b7355;margin-top:2px">'+es(s.phone||"")+'</div><div style="font-size:11px;color:#8b7355">'+es(s.products||"")+'</div></div><div style="text-align:right"><div style="font-weight:700;color:'+(s.owed>0?"#dc2626":"#16a34a")+';font-size:15px">'+fc(s.owed)+'</div><div style="font-size:11px;color:#8b7355">dena hai</div></div></div><div style="display:flex;gap:7px">'+(s.phone?'<a href="tel:'+s.phone+'" style="padding:6px 12px;border-radius:9px;font-size:11px;font-weight:700;background:#f0fdf4;color:#16a34a;text-decoration:none">&#x1F4DE; Call</a>':'')+(s.phone?' <a href="https://wa.me/91'+s.phone+'" target="_blank" style="padding:6px 12px;border-radius:9px;font-size:11px;font-weight:700;background:#f0fdf4;color:#25d366;text-decoration:none">&#x1F4E4; WA</a>':'')+(s.owed>0?' <button onclick="pSM('+s.id+')" style="padding:6px 12px;border-radius:9px;font-size:11px;font-weight:700;background:#fef2f2;color:#dc2626;cursor:pointer">Payment Record Karo</button>':"")+'</div></div>';});h+='</div>';G("pg-more").innerHTML=h;}
function aSM(){oM("Supplier Add Karo",'<label class="lbl">Naam</label><input id="sf-n" class="inp" placeholder="ITC Distributor"/><label class="lbl">Phone (WhatsApp ke liye)</label><input id="sf-p" class="inp" type="tel" placeholder="10 digit mobile"/><label class="lbl">Products</label><input id="sf-pr" class="inp" placeholder="e.g. Cigarettes, Gutka"/><button class="pbtn" onclick="svSup()" style="background:#475569">Save Karo</button>');}
function svSup(){var n=(G("sf-n").value||"").trim();if(!n)return;S.sups.push({id:gid(),name:n,phone:G("sf-p").value||"",products:G("sf-pr").value||"",owed:0});sA();cM();rSups();toast("Supplier add ho gaya!");}
function pSM(id){var s=S.sups.find(x=>x.id===id);oM("Payment Record Karo",'<div style="text-align:center;background:#f9f5f0;border-radius:13px;padding:13px;margin-bottom:13px"><div style="font-weight:700;font-size:15px">'+es(s.name)+'</div><div style="font-size:13px;color:#dc2626;margin-top:3px">Dena hai: '+fc(s.owed)+'</div></div><label class="lbl">Kitna Diya (Rs.)</label><input id="sp-a" class="inp" type="number" placeholder="Amount" style="font-size:22px;text-align:center;font-weight:700"/><button class="pbtn" onclick="svSP('+id+')" style="background:#16a34a">Record Karo</button>');}
function svSP(id){var amt=Number((G("sp-a")||{}).value);if(!amt)return;var s=S.sups.find(x=>x.id===id);if(s)s.owed=Math.max(0,s.owed-amt);sA();cM();rSups();toast("Payment record ho gaya!");}

function svSets(){S.store=(G("st-n")||{}).value||"My Pan Shop";S.ownerWa=(G("st-wa")||{}).value||"";S.upiId=(G("st-upi")||{}).value||"";sA();toast("Settings save ho gayi!");rSets();}
